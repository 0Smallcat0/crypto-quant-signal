version: "1"
data_source:
  provider: binance_spot_public
  symbols:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
  timeframe: 1d
  rest_base_url_candidates:
    - https://data-api.binance.vision
    - https://api.binance.com
    - https://api-gcp.binance.com
    - https://api1.binance.com
    - https://api2.binance.com
    - https://api3.binance.com
    - https://api4.binance.com
  ws_stream_base_url_candidates:
    - wss://data-stream.binance.vision/stream
    - wss://stream.binance.com:443/stream
    - wss://stream.binance.com:9443/stream
  timeout_seconds: "10"
  private_api_enabled: false
  api_key_required: false
strategy:
  # Daily Trend Ensemble has no tunable parameters by contract:
  # docs/contracts/STRATEGY_DAILY_TREND_ENSEMBLE.md fixes SMA 20/65/150/200.
  name: daily_trend_ensemble
  allowed_signals:
    - LONG
    - FLAT
  allow_short: false
portfolio:
  max_active_positions: 3
  max_symbol_weight: "0.35"
  max_gross_exposure: "1.0"
  cash_allowed: true
  cooldown_enabled: true
  allow_short: false
  # v0.9 decision universe: SOLUSDT stays out until it passes the validation gate.
  risk_budgets:
    BTCUSDT: "0.5"
    ETHUSDT: "0.5"
risk:
  min_notional_usdt: "10"
  stale_data_max_age_seconds: 129600
  # Research expects 50-60% drawdowns as normal for the daily trend ensemble
  # (docs/research/SIGNAL_DESIGN_RESEARCH.md section 4); the pause is a
  # disaster brake above that band. Trial 1 proved 0.20 locks the strategy out.
  max_drawdown_fraction: "0.65"
  daily_loss_pause_fraction: "0.10"
  disaster_single_day_drop_fraction: "0.20"
  short_exposure_enabled: false
  margin_enabled: false
  leverage_enabled: false
execution:
  mode: paper
  fee_bps: "10"
  slippage_bps: "5"
  quantity_step: "0.000001"
  price_tick: "0.01"
  real_orders_enabled: false
  private_api_enabled: false
  margin_enabled: false
  leverage_enabled: false
account:
  account_id: paper-main
  initial_cash: "1000"
  quote_asset: USDT
runtime:
  mode: paper
  decision_timeframe: 1d
  config_snapshot_required: true
  halt_on_stale_data: true
  idempotency_key_namespace: paper-runtime
  real_trading_enabled: false
  private_api_enabled: false
storage:
  backend: postgresql
  host: localhost
  port: 54320
  database: crypto_quant
  username: crypto
  password: crypto_dev_only
  snapshot_directory: docs/reports/config-snapshots
  trial_registry_path: docs/reports/research/trial_registry.jsonl
  holdout_lock_path: docs/reports/research/holdout_lock.json
  backtest_reports_directory: docs/reports/backtests
  candle_files_directory: data/candles
  runtime_events_path: data/runtime/events.jsonl
notifications:
  enabled: true
  # channel: log | webhook | discord
  #   discord loads DISCORD_BOT_TOKEN + DISCORD_CHANNEL_ID from environment
  #   variables (never stored here); the bot token must never be committed.
  #   Missing env vars degrade to log with a warning; pending notifications
  #   flush automatically once credentials appear.
  channel: discord
  webhook_url: ""
  # Your stated follow capital: sizes push messages ("buy ~125 USDT") and is
  # the dashboard default. Does NOT change the fixed 1000 USDT virtual account.
  follow_principal_usdt: "1000"
api_dashboard:
  enabled: true
  host: 127.0.0.1
  port: 8000
  read_only: true
  manual_orders_enabled: false
  risk_limit_mutation_enabled: false
  private_account_access_enabled: false
